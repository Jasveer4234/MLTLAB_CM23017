<!DOCTYPE html>
<html>

<head>
<title>Assignment 1 - Webcam Object Classification</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
font-family: Arial;
background:#111827;
color:white;
text-align:center;
}

video{
border-radius:10px;
margin-top:20px;
}

#prediction{
margin-top:20px;
font-size:22px;
color:#22c55e;
}

</style>

</head>

<body>

<h2>Webcam Object Classification using MobileNet</h2>

<video id="webcam" width="640" height="480" autoplay></video>

<div id="prediction">Loading model...</div>

<script>

const video = document.getElementById("webcam");
const predictionText = document.getElementById("prediction");

let model;

async function setupCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject = stream;

return new Promise(resolve=>{
video.onloadedmetadata = ()=>{
resolve(video);
};
});

}

async function loadModel(){

predictionText.innerText="Loading MobileNet Model...";

model = await mobilenet.load();

predictionText.innerText="Model Loaded";

}

async function classifyFrame(){

const predictions = await model.classify(video);

if(predictions.length>0){

predictionText.innerText =
predictions[0].className +
" (" + (predictions[0].probability*100).toFixed(2) + "%)";

}

requestAnimationFrame(classifyFrame);

}

async function main(){

await setupCamera();

video.play();

await loadModel();

classifyFrame();

}

main();

</script>

</body>

</html>
