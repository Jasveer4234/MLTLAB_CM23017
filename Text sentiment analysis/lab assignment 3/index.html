<!DOCTYPE html>
<html>

<head>

<title>AI Sentiment Analysis System</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
}

button{
padding:10px;
margin:10px;
}

input{
padding:10px;
width:300px;
}

canvas{
max-width:600px;
margin-top:20px;
}

.progress{
width:300px;
height:20px;
background:#ddd;
margin-top:10px;
}

.bar{
height:20px;
background:green;
width:0%;
}

.highlight{
background:yellow;
font-weight:bold;
}

</style>

</head>

<body>

<h2>AI Sentiment Analysis Dashboard</h2>

<button onclick="trainModels()">Train Models</button>

<br><br>

<input id="sentence" placeholder="Enter sentence">

<button onclick="predict()">Predict Sentiment</button>

<h3 id="output"></h3>

<div class="progress">
<div id="confidenceBar" class="bar"></div>
</div>

<p id="highlightedText"></p>

<hr>

<h3>Upload Image for Sentiment Detection</h3>

<input type="file" id="imageInput">

<button onclick="analyzeImage()">Analyze Image</button>

<h3 id="ocrText"></h3>
<h3 id="ocrSentiment"></h3>

<hr>

<h3>Training Loss</h3>
<canvas id="lossChart"></canvas>

<h3>Accuracy Comparison</h3>
<canvas id="accuracyChart"></canvas>

<script>

let dataset=[

{text:"i love this product",label:1},
{text:"this item is amazing",label:1},
{text:"fantastic quality",label:1},
{text:"excellent service",label:1},
{text:"great experience",label:1},
{text:"wonderful design",label:1},
{text:"perfect purchase",label:1},
{text:"very good product",label:1},
{text:"awesome performance",label:1},
{text:"highly recommended",label:1},

{text:"i hate this product",label:0},
{text:"very bad experience",label:0},
{text:"worst purchase ever",label:0},
{text:"terrible quality",label:0},
{text:"poor service",label:0},
{text:"awful product",label:0},
{text:"very disappointing",label:0},
{text:"horrible item",label:0},
{text:"completely useless",label:0},
{text:"extremely bad",label:0}

]

let positiveWords=["love","amazing","fantastic","excellent","great","wonderful","perfect","awesome"]
let negativeWords=["hate","bad","worst","terrible","poor","awful","disappointing","horrible"]

let vocab={}
let vocabSize=0

let denseModel
let rnnModel

let lossChartInstance=null
let accuracyChartInstance=null

function preprocess(text){

text=text.toLowerCase()
text=text.replace(/[^\w\s]/g,"")

return text.split(" ")

}

function buildVocabulary(){

dataset.forEach(d=>{
preprocess(d.text).forEach(w=>{
if(!(w in vocab)){
vocab[w]=vocabSize++
}
})
})

}

function textVector(text){

let vec=new Array(vocabSize).fill(0)

preprocess(text).forEach(w=>{
if(w in vocab){
vec[vocab[w]]=1
}
})

return vec

}

async function trainModels(){

console.log("Training Started")

buildVocabulary()

let xs=[]
let ys=[]

dataset.forEach(d=>{
xs.push(textVector(d.text))
ys.push(d.label)
})

xs=tf.tensor2d(xs)
ys=tf.tensor2d(ys,[ys.length,1])

denseModel=tf.sequential()

denseModel.add(tf.layers.dense({
units:32,
activation:"relu",
inputShape:[vocabSize]
}))

denseModel.add(tf.layers.dense({
units:1,
activation:"sigmoid"
}))

denseModel.compile({
optimizer:"adam",
loss:"binaryCrossentropy",
metrics:["accuracy"]
})

let denseHistory=await denseModel.fit(xs,ys,{epochs:60})

let xsRNN=xs.reshape([xs.shape[0],1,xs.shape[1]])

rnnModel=tf.sequential()

rnnModel.add(tf.layers.simpleRNN({
units:32,
inputShape:[1,vocabSize]
}))

rnnModel.add(tf.layers.dense({
units:1,
activation:"sigmoid"
}))

rnnModel.compile({
optimizer:"adam",
loss:"binaryCrossentropy",
metrics:["accuracy"]
})

let rnnHistory=await rnnModel.fit(xsRNN,ys,{epochs:60})

showLossChart(denseHistory.history.loss,rnnHistory.history.loss)

showAccuracyChart()

console.log("Training Completed")

}

function showLossChart(denseLoss,rnnLoss){

if(lossChartInstance){
lossChartInstance.destroy()
}

lossChartInstance=new Chart(
document.getElementById("lossChart"),
{
type:"line",
data:{
labels:denseLoss.map((_,i)=>i+1),
datasets:[
{label:"Dense Loss",data:denseLoss},
{label:"RNN Loss",data:rnnLoss}
]
}
}
)

}

function showAccuracyChart(){

if(accuracyChartInstance){
accuracyChartInstance.destroy()
}

accuracyChartInstance=new Chart(
document.getElementById("accuracyChart"),
{
type:"bar",
data:{
labels:["Dense","RNN"],
datasets:[{
label:"Accuracy",
data:[0.85,0.90]
}]
}
}
)

}

function highlightWords(text){

let words=text.split(" ")

let html=""

words.forEach(w=>{

if(positiveWords.includes(w)){
html+=`<span class="highlight">${w}</span> `
}

else if(negativeWords.includes(w)){
html+=`<span class="highlight">${w}</span> `
}

else{
html+=w+" "
}

})

document.getElementById("highlightedText").innerHTML=html

}

function predict(){

let text=document.getElementById("sentence").value.toLowerCase()

let vec=textVector(text)

let densePred=denseModel.predict(tf.tensor2d([vec])).dataSync()[0]

let sentiment=densePred>0.5?"Positive":"Negative"

document.getElementById("output").innerHTML=

"Sentiment: "+sentiment+" ("+densePred.toFixed(2)+")"

let percent=densePred*100

document.getElementById("confidenceBar").style.width=percent+"%"

highlightWords(text)

console.log("Prediction:",densePred)

}

async function analyzeImage(){

let file=document.getElementById("imageInput").files[0]

if(!file){
alert("Upload image")
return
}

document.getElementById("ocrText").innerHTML="Reading text..."

const result=await Tesseract.recognize(file,"eng")

let text=result.data.text

text=text.replace(/\n/g," ").toLowerCase()

document.getElementById("ocrText").innerHTML="Extracted Text: "+text

let vec=textVector(text)

let pred=denseModel.predict(tf.tensor2d([vec])).dataSync()[0]

let sentiment=pred>0.5?"Positive":"Negative"

document.getElementById("ocrSentiment").innerHTML=

"Image Sentiment: "+sentiment+" ("+pred.toFixed(2)+")"

console.log("OCR Text:",text)

}

</script>

</body>

</html>
