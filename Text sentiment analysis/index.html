<!DOCTYPE html>
<html>

<head>

<title>RNN Sentiment Analysis</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>

body{
font-family:Arial;
margin:40px;
}

button{
padding:10px;
margin:10px;
}

input{
padding:10px;
width:350px;
}

#result{
font-size:20px;
margin-top:20px;
}

</style>

</head>

<body>

<h2>Text Sentiment Analysis using RNN</h2>

<button onclick="trainModel()">Train Model</button>

<br><br>

<input id="textInput" placeholder="Enter sentence">

<button onclick="predictSentiment()">Predict Sentiment</button>

<div id="result"></div>

<script>

const dataset=[

{text:"i love this product",label:1},
{text:"this product is amazing",label:1},
{text:"fantastic quality",label:1},
{text:"excellent service",label:1},
{text:"great experience",label:1},
{text:"wonderful item",label:1},
{text:"very good product",label:1},
{text:"best purchase ever",label:1},

{text:"i hate this product",label:0},
{text:"this is terrible",label:0},
{text:"very bad experience",label:0},
{text:"worst purchase ever",label:0},
{text:"poor quality",label:0},
{text:"awful service",label:0},
{text:"very disappointing",label:0},
{text:"horrible product",label:0}

]

let vocab={}
let vocabSize=0
let maxLen=6
let model

function preprocess(text){

text=text.toLowerCase()
text=text.replace(/[^\w\s]/g,"")

let words=text.split(" ")

if(words.length>maxLen){
words=words.slice(0,maxLen)
}

while(words.length<maxLen){
words.push("pad")
}

return words

}

function buildVocabulary(){

dataset.forEach(d=>{

preprocess(d.text).forEach(word=>{

if(!(word in vocab)){
vocab[word]=vocabSize++
}

})

})

}

function textSequence(text){

let seq=[]

preprocess(text).forEach(word=>{

if(word in vocab){
seq.push(vocab[word])
}else{
seq.push(0)
}

})

return seq

}

async function trainModel(){

console.log("Training Started")

buildVocabulary()

let xs=[]
let ys=[]

dataset.forEach(d=>{

xs.push(textSequence(d.text))
ys.push(d.label)

})

xs=tf.tensor2d(xs,[xs.length,maxLen])
ys=tf.tensor2d(ys,[ys.length,1])

model=tf.sequential()

model.add(tf.layers.embedding({

inputDim:vocabSize,
outputDim:10,
inputLength:maxLen

}))

model.add(tf.layers.simpleRNN({

units:16

}))

model.add(tf.layers.dense({

units:1,
activation:"sigmoid"

}))

model.compile({

optimizer:"adam",
loss:"binaryCrossentropy",
metrics:["accuracy"]

})

await model.fit(xs,ys,{

epochs:40,
shuffle:true

})

console.log("Training Completed")

alert("Model Training Completed")

}

function predictSentiment(){

if(!model){
alert("Train the model first")
return
}

let text=document.getElementById("textInput").value

let seq=textSequence(text)

let input=tf.tensor2d([seq],[1,maxLen])

let prediction=model.predict(input).dataSync()[0]

let sentiment

if(prediction>0.6){
sentiment="Positive"
}
else if(prediction<0.4){
sentiment="Negative"
}
else{
sentiment="Neutral"
}

document.getElementById("result").innerHTML=

"Sentiment: "+sentiment+
"<br>Confidence: "+prediction.toFixed(2)

console.log("Prediction:",prediction)

}

</script>

</body>

</html>
