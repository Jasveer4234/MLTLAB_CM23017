<!DOCTYPE html>
<html>

<head>

<title>Lab 2 - Sentiment Prediction</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>

body{
font-family:Arial;
margin:40px;
}

input{
padding:10px;
width:300px;
}

button{
padding:10px;
margin-left:10px;
}

</style>

</head>

<body>

<h2>Sentiment Analysis - Prediction</h2>

<button onclick="trainModel()">Train Model</button>

<h3 id="status"></h3>

<hr>

<h3>Enter Sentence</h3>

<input id="sentence" placeholder="Type sentence here">

<button onclick="predict()">Analyze Sentiment</button>

<h3 id="prediction"></h3>

<script>

const positiveSentences = [
"I love this product","This item is amazing","Fantastic experience",
"Very good quality","Excellent product","Best purchase ever",
"Very satisfied","Superb design","Outstanding performance",
"Wonderful service","Highly recommended","Great quality item",
"Absolutely fantastic","Amazing quality","Perfect purchase",
"Great service","Very comfortable","Totally worth it",
"Great performance","Really good product"
]

const negativeSentences = [
"I hate this product","Worst purchase ever","Terrible experience",
"Very poor quality","Awful product","Very disappointing",
"Not worth the money","Extremely bad","Completely useless",
"Horrible service","Worst item ever","Poor performance",
"I regret buying this","This is terrible","Not good at all",
"Absolutely awful","Waste of money","Very unreliable",
"Very bad product","Terrible quality"
]

let dataset=[]

positiveSentences.forEach(t=>dataset.push({text:t,label:1}))
negativeSentences.forEach(t=>dataset.push({text:t,label:0}))

let vocabulary={}
let vocabSize=0
let model

function preprocess(text){

text=text.toLowerCase()
text=text.replace(/[^\w\s]/g,"")

return text.split(" ")

}

function buildVocabulary(){

dataset.forEach(d=>{

let words=preprocess(d.text)

words.forEach(w=>{

if(!(w in vocabulary)){
vocabulary[w]=vocabSize++
}

})

})

}

function textToVector(text){

let vector=new Array(vocabSize).fill(0)

let words=preprocess(text)

words.forEach(w=>{
if(w in vocabulary){
vector[vocabulary[w]]=1
}
})

return vector

}

async function trainModel(){

document.getElementById("status").innerHTML="Training Model..."

buildVocabulary()

let xs=dataset.map(d=>textToVector(d.text))
let ys=dataset.map(d=>d.label)

xs=tf.tensor2d(xs)
ys=tf.tensor2d(ys,[ys.length,1])

model=tf.sequential()

model.add(tf.layers.dense({
units:16,
activation:'relu',
inputShape:[vocabSize]
}))

model.add(tf.layers.dense({
units:1,
activation:'sigmoid'
}))

model.compile({
optimizer:'adam',
loss:'binaryCrossentropy',
metrics:['accuracy']
})

await model.fit(xs,ys,{
epochs:120
})

document.getElementById("status").innerHTML="Training Complete ✔"

console.log("Model training finished")

}

function predict(){

if(!model){
alert("Train the model first")
return
}

let text=document.getElementById("sentence").value

let vec=textToVector(text)

let prediction=model.predict(tf.tensor2d([vec]))

prediction.data().then(res=>{

let score=res[0]

let sentiment=score>0.5?"Positive 😊":"Negative 😡"

document.getElementById("prediction").innerHTML=
"Sentiment: "+sentiment+" | Confidence: "+score.toFixed(2)

console.log("Input:",text)
console.log("Sentiment:",sentiment)
console.log("Confidence:",score)

})

}

</script>

</body>

</html>
