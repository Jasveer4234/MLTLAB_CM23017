<!DOCTYPE html>
<html>
<head>
  <title>Assignment 1 - Train & Save Model</title>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #43cea2, #185a9d);
      text-align: center;
      color: white;
      margin-top: 40px;
    }

    .container {
      background: rgba(0,0,0,0.3);
      padding: 25px;
      width: 350px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0px 0px 15px rgba(0,0,0,0.4);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: orange;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    h3 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Train & Save Model</h2>

  <button id="trainBtn" onclick="trainModel()">Train Model</button>

  <h3 id="status">Click to start training</h3>
  <h3 id="loss"></h3>

</div>

<script>

let model;

// Train Model Function
async function trainModel() {

  const btn = document.getElementById("trainBtn");
  const status = document.getElementById("status");
  const lossText = document.getElementById("loss");

  btn.disabled = true;
  status.innerText = "Training started...";

  // Create model
  model = tf.sequential();
  model.add(tf.layers.dense({units: 1, inputShape: [1]}));

  // Compile model
  model.compile({
    loss: 'meanSquaredError',
    optimizer: 'sgd'
  });

  // Data (y = 2x + 1)
  const xs = tf.tensor([1,2,3,4]);
  const ys = tf.tensor([3,5,7,9]);

  // Train with live loss display
  await model.fit(xs, ys, {
    epochs: 100,
    callbacks: {
      onEpochEnd: (epoch, logs) => {
        lossText.innerText =
          "Epoch: " + (epoch + 1) +
          " | Loss: " + logs.loss.toFixed(5);
      }
    }
  });

  // Save model
  await model.save('localstorage://my-model');

  status.innerText = "Model trained & saved successfully!";
  btn.disabled = false;
}

</script>

</body>
</html>
