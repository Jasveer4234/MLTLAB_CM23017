```html
<!DOCTYPE html>
<html>

<head>

<title>MobileNet Accuracy Test</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
margin-top:40px;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#007bff;
color:white;
}

img{
border-radius:8px;
}

</style>

</head>

<body>

<h2>MobileNet Accuracy Test</h2>

<input type="file" id="upload" multiple accept="image/*">

<p>Select 5 images to test accuracy</p>

<table id="resultTable">

<tr>
<th>Image</th>
<th>Actual Label</th>
<th>Predicted Label</th>
<th>Confidence</th>
</tr>

</table>

<h3 id="accuracy"></h3>

<script>

let model;
let correct=0;
let total=0;

async function loadModel(){

model=await mobilenet.load();

console.log("Model Loaded");

}

loadModel();

const upload=document.getElementById("upload");

upload.addEventListener("change",async function(){

const files=upload.files;

for(let file of files){

const img=document.createElement("img");

img.width=100;

img.src=URL.createObjectURL(file);

await new Promise(resolve=>{
img.onload=resolve;
});

const predictions=await model.classify(img,1);

let predicted=predictions[0].className;

let confidence=(predictions[0].probability*100).toFixed(2)+"%";

let actual=prompt("Enter actual label for this image:");

total++;

if(predicted.toLowerCase().includes(actual.toLowerCase())){

correct++;

}

let table=document.getElementById("resultTable");

let row=table.insertRow();

row.insertCell(0).appendChild(img);
row.insertCell(1).innerHTML=actual;
row.insertCell(2).innerHTML=predicted;
row.insertCell(3).innerHTML=confidence;

}

let accuracy=(correct/total)*100;

document.getElementById("accuracy").innerHTML=
"Accuracy = "+accuracy.toFixed(2)+"%";

});

</script>

</body>

</html>
```
